<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="./src/css/style.css">
    <title>Bhaskara</title>
</head>
<body>
    <form>
        <h2>Resolvendo Bhaskara</h2>
        <br>
        <p>Informe os valores dos coeficientes:</p>
        <div id="equacao">
            <input type="number" id="txtA" class="txt" placeholder="a" autofocus> 
            <span>x<sup>2</sup> +</span>
            <input type="number" id="txtB" class="txt" placeholder="b">
            <span>x +</span>
            <input type="number" id="txtC" class="txt" placeholder="c">
            <span>= 0</span>  
        </div>
        <div id="delta">
            <label for="txtDelta">O valor de delta é: </label>
            <input type="text" id="txtDelta" placeholder="Delta" disabled>
        </div>
        <div id="raizes">
            <span>As raízes são: </span>
            <span>(</span>
            <input type="text" id="txtRaizA" placeholder="Raiz A" disabled>
            <span>,</span>
            <input type="text" id="txtRaizB" placeholder="Raiz B" disabled>
            <span>)</span>
        </div>
        <div id="botoes">
            <input type="button" value="Calcular"  onclick="Calcular()" id="calcular">
            <input type="reset"  value="Limpar" onclick="Limpar()" id="limpar">
        </div>
    </form>
    <script src="./src/js/script.js"></script>
</body>
</html>
